<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>daddy's party — backend status</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0d0020, #1e0035);
      color: #f0f0f5; font-family: system-ui, sans-serif; text-align: center; padding: 20px;
    }
    .card {
      max-width: 480px; padding: 40px;
      background: #12001f; border: 1.5px solid #d63af940; border-radius: 18px;
      box-shadow: 0 20px 50px #00000090;
    }
    h1 {
      margin: 0 0 8px;
      background: linear-gradient(90deg, #ff2d78, #bf5af2);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .sub { color: #9969cc; font-size: .9rem; margin-bottom: 24px; }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #4ade80; margin-right: 6px; }
    code { background: #1e0035; padding: 2px 8px; border-radius: 6px; color: #ff2d78; font-size: .85rem; }
    .row { margin: 10px 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>daddy's party 🎬</h1>
    <div class="sub">backend WebSocket server</div>
    <div class="row"><span class="dot"></span><strong>server is running</strong></div>
    <div class="row" style="font-size:.85rem;color:#aaa">use the browser extension to connect — this URL isn't meant to be opened directly.</div>
    <div class="row" style="font-size:.75rem;color:#664488;margin-top:24px">
      ws endpoint: <code>wss://watchparty-ayjl.onrender.com</code>
    </div>
  </div>
</body>
</html>
