<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>daddy's party 🎬</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- update banner — visible across all screens when a new version is out -->
  <a id="update-banner" class="hidden" href="https://github.com/suyog-1/watchparty/releases/latest" target="_blank">
    🎁 <strong>update available</strong> — <span id="update-version-text"></span> · click to download
  </a>

  <!-- connect -->
  <div id="screen-connect">
    <div class="brand">
      <h1>DADDY'S PARTY</h1>
      <p class="tagline">cinema for two 🎬</p>
    </div>

    <div class="field">
      <label>your name</label>
      <input id="username" type="text" placeholder="e.g. daddy" maxlength="20" autocomplete="nope" />
    </div>

    <button id="create-btn" class="btn primary">🎬 start the party</button>

    <div class="divider">already got a code?</div>

    <div class="row">
      <input id="room-code" type="text" placeholder="room code" maxlength="6" autocomplete="nope" />
      <button id="join-btn" class="btn secondary">join 🍿</button>
    </div>

    <p id="error-msg" class="error hidden"></p>
  </div>

  <!-- already connected in another tab -->
  <div id="screen-other-tab" class="hidden">
    <div class="brand">
      <h1>DADDY'S PARTY</h1>
    </div>
    <div class="already-box">
      <p class="already-emoji">🎬</p>
      <p class="already-text">you're already in a party</p>
      <p class="already-sub">go back to the tab you started it in</p>
    </div>
    <button id="goto-tab-btn" class="btn primary">take me there →</button>
    <button id="leave-other-btn" class="btn danger">leave that party first</button>
  </div>

  <!-- connected -->
  <div id="screen-connected" class="hidden">
    <div class="brand">
      <h1>DADDY'S PARTY</h1>
      <p class="tagline">you're in 🫶</p>
    </div>
    <div class="connected-box">
      <div class="info-row">
        <div>
          <div class="label">room code</div>
          <div id="display-code" class="code"></div>
        </div>
        <div>
          <div class="label">watching with</div>
          <div id="display-members" class="members">—</div>
        </div>
      </div>
    </div>
    <p class="tip">chat panel is in the bottom-right of the streaming tab 👀</p>
    <button id="leave-btn" class="btn danger">💀 leave room</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
